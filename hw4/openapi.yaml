openapi: 3.0.3
info:
  title: MAX Disk 360 API
  description: REST API для сервиса хранения файлов MAX Disk 360
  version: 1.0.0

servers:
  - url: http://localhost:8080/max-disk

tags:
  - name: Users
    description: Операции, связанные с пользователями
  - name: Folders
    description: Управление папками пользователя
  - name: Files
    description: Управление файлами внутри папок

paths:
  /v1/users/auth/login:
    post:
      tags:
        - Users
      summary: Аутентификация пользователя
      description: Проверяет логин и пароль пользователя и возвращает JWT токен
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Неверный логин или пароль
  /v1/users/auth/register:
    post:
      tags:
        - Users
      summary: Создание нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
        '409':
          description: Пользователь уже существует
  /v1/users/search:
    get:
      tags:
        - Users
      summary: Поиск пользователей по маске имени и фамилии
      security:
        - bearerAuth: []
      parameters:
        - name: firstName
          in: query
          required: true
          description: Маска имени пользователя (* означает любые символы, поддерживается в начале или в конце)
          schema:
            type: string
        - name: lastName
          in: query
          required: true
          description: Маска фамилии пользователя (* означает любые символы, поддерживается в начале или в конце)
          schema:
            type: string
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUsersResponse'
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
  /v1/users/search/login:
    get:
      tags:
        - Users
      summary: Поиск пользователя по логину
      security:
        - bearerAuth: []
      parameters:
        - name: login
          in: query
          required: true
          description: Логин пользователя
          schema:
            type: string
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '404':
          description: Пользователь не найден

  /v1/folders:
    post:
      tags:
        - Folders
      summary: Создание новой папки
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '201':
          description: Папка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFolderResponse'
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '409':
          description: Папка с таким именем уже существует
    get:
      tags:
        - Folders
      summary: Получение списка всех папок
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список папок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFoldersResponse'
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
  /v1/folders/{folderId}:
    delete:
      tags:
        - Folders
      summary: Удаление папки
      security:
        - bearerAuth: []
      parameters:
        - name: folderId
          in: path
          required: true
          description: Уникальный идентификатор папки
          schema:
            type: string
            format: uuid
            example: d77d636b-fab5-4aa2-94ea-d8ea52e3d83b
      responses:
        '204':
          description: Папка удалена
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '404':
          description: Папка не найдена

  /v1/folders/{folderId}/files:
    post:
      tags:
        - Files
      summary: Создание файла в папке
      description: Загружает файл с бинарным содержимым в указанную папку
      security:
        - bearerAuth: []
      parameters:
        - name: folderId
          in: path
          required: true
          description: Уникальный идентификатор папки
          schema:
            type: string
            format: uuid
            example: d77d636b-fab5-4aa2-94ea-d8ea52e3d83b
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Бинарное содержимое файла для загрузки
      responses:
        '201':
          description: Файл успешно загружен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '404':
          description: Папка не найдена
        '409':
          description: Файл с таким именем уже существует в папке
    get:
      tags:
        - Files
      summary: Получение файла по имени
      description: Возвращает бинарное содержимое файла для скачивания
      security:
        - bearerAuth: []
      parameters:
        - name: folderId
          in: path
          required: true
          description: Уникальный идентификатор папки
          schema:
            type: string
            format: uuid
            example: d77d636b-fab5-4aa2-94ea-d8ea52e3d83b
        - name: name
          in: query
          required: true
          description: Имя файла для получения
          schema:
            type: string
          example: document.pdf
      responses:
        '200':
          description: Файл получен успешно
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              description: Имя файла
              schema:
                type: string
                example: 'attachment; filename="document.pdf"'
            Content-Length:
              description: Размер файла в байтах
              schema:
                type: integer
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '404':
          description: Файл не найден
  /v1/folders/{folderId}/files/{fileId}:
    delete:
      tags:
        - Files
      summary: Удаление файла
      security:
        - bearerAuth: []
      parameters:
        - name: folderId
          in: path
          required: true
          description: Уникальный идентификатор папки
          schema:
            type: string
            format: uuid
            example: d77d636b-fab5-4aa2-94ea-d8ea52e3d83b
        - name: fileId
          in: path
          required: true
          description: Уникальный идентификатор файла
          schema:
            type: string
            format: uuid
            example: d77d636b-fab5-4aa2-94ea-d8ea52e3d83b
      responses:
        '401':
          description: Пользователь не аутентифицирован
        '403':
          description: Пользователь не авторизован
        '204':
          description: Файл удалён
        '404':
          description: Файл не найден

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      description: Запрос на аутентификацию пользователя
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: Логин пользователя
          example: ivan.petrov
        password:
          type: string
          description: Пароль пользователя
          example: P@ssw0rd!23

    LoginResponse:
      type: object
      description: Ответ с JWT токеном после успешной аутентификации
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          description: JWT токен доступа
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    User:
      type: object
      description: Информация о пользователе
      required:
        - id
        - login
        - firstName
        - lastName
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя
          example: 2c1c9f3a-6e2a-4d7b-8d27-9f0f4b3f9d11
        login:
          type: string
          description: Уникальный логин пользователя
          example: ivan.petrov
        firstName:
          type: string
          description: Имя пользователя
          example: Ivan
        lastName:
          type: string
          description: Фамилия пользователя
          example: Petrov

    GetUsersResponse:
      type: object
      description: Ответ со списком найденных пользователей
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей, соответствующих параметрам поиска
          items:
            $ref: '#/components/schemas/User'

    UserRegistrationRequest:
      type: object
      description: Данные для регистрации нового пользователя
      required:
        - phone
        - email
        - firstName
        - lastName
      properties:
        phone:
          type: string
          description: Номер телефона пользователя в формате E.164
          example: "+79991234567"
          pattern: '^\+[1-9]\d{7,14}$'
        email:
          type: string
          description: Email пользователя
          example: ivan.petrov@mail.ru
          pattern: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
        firstName:
          type: string
          description: Имя пользователя
          example: Ivan
        lastName:
          type: string
          description: Фамилия пользователя
          example: Petrov

    UserRegistrationResponse:
      type: object
      description: Ответ после успешной регистрации пользователя
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор созданного пользователя
          example: 2c1c9f3a-6e2a-4d7b-8d27-9f0f4b3f9d11

    Folder:
      type: object
      description: Папка пользователя для хранения файлов
      required:
        - id
        - name
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор папки
          example: 5e4b7d2c-1f3a-4b9d-9a23-bb8d34a6c123
        name:
          type: string
          description: Название папки
          example: Work Documents
        createdAt:
          type: string
          format: date-time
          description: Дата и время создания папки
          example: "2026-03-09T12:30:00Z"

    GetFoldersResponse:
      type: object
      description: Ответ со списком папок пользователя
      required:
        - folders
      properties:
        folders:
          type: array
          description: Список папок пользователя
          items:
            $ref: '#/components/schemas/Folder'

    CreateFolderRequest:
      type: object
      description: Запрос на создание новой папки
      required:
        - name
      properties:
        name:
          type: string
          description: Название создаваемой папки
          example: Travel Photos

    CreateFolderResponse:
      type: object
      description: Ответ после успешного создания папки
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор созданной папки
          example: a4b9d7e1-8c2f-45a7-9e1a-4f0a2b3c5d67

    CreateFileResponse:
      type: object
      description: Ответ после успешного создания файла
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор созданного файла
          example: 3a7f8d2b-9b1e-4a5f-a8b7-5d6e7f8c9123